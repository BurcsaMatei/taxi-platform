name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build @taxi/shared (dist consumed by api and controlcenter types)
        run: npm -w packages/shared run build

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Lint controlcenter
        run: npm -w controlcenter run lint

      - name: Build api
        run: npm -w api run build

      - name: Build controlcenter
        run: npm -w controlcenter run build
